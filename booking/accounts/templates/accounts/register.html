{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | BusinessSpace</title>
    <link rel="stylesheet" href="{% static 'accounts/style.css' %}">
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="auth-title">Реєстрація</div>

        <form method="post">
            {% csrf_token %}
            
            <div class="django-form-container">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-auth-submit">
                Створити аккаунт
            </button>
        </form>

        <div class="auth-footer-text">
            Вже є аккаунт? 
            <a href="{% url 'login' %}" class="auth-footer-link">Увійти</a>
        </div>
    </div>

</body>
</html>
